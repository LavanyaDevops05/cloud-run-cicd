apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-hello
  template:
    metadata:
      labels:
        app: flask-hello
    spec:
      containers:
      - name: flask-hello
        image: us-central1-docker.pkg.dev/gcp-lab-webapp-497715/lavipocimage/flask-image-demo:v2
        ports:
        - containerPort: 8080
